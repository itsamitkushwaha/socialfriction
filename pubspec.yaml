name: social_friction
description: "Social Friction"

flutter_launcher_icons:
  android: true
  ios: true
  # General fallback icon (used for iOS & legacy Android < API 26)
  image_path: "assets/logo_512.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  # Adaptive icon (Android 8.0+ / API 26+)
  # Background: dark navy matching the logo's backdrop
  adaptive_icon_background: "#0A1628"
  # Foreground: logo centered in 108dp canvas, content in 66dp safe zone
  adaptive_icon_foreground: "assets/logo_transparent.png"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  usage_stats: ^1.3.1
  installed_apps: ^2.1.1
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  intl: ^0.20.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  firebase_storage: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/
