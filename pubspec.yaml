name: social_friction
description: "Social Friction"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  usage_stats: ^1.3.1
  installed_apps: ^1.4.0
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/
